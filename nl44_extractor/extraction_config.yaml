# ============================================================
# NL-44 Extraction Pipeline Configuration
# ============================================================

base_path: "/Users/pulkit/Desktop/Forms"

fiscal_years:
  - FY2026

quarters: all

master_sheet_path: "/Users/pulkit/Desktop/Forms/NL44_Master.xlsx"
processed_log_path: "/Users/pulkit/Desktop/Forms/.NL44_processed_log.json"

consolidated_mode: dynamic

nl44_keywords:
  - "NL-44"
  - "MOTOR TP OBLIGATIONS"
  - "LIABILITY ONLY POLICIES"
  - "PACKAGE POLICIES"

nl44_keyword_min_matches: 3

# Companies to skip entirely — no NL-44 published or schema incompatible.
# Health-only insurers don't write Motor TP; Chola uses the new IRDAI 2024
# regulatory compliance schema (GCV/PCV/Tractor counts) not yet supported.
skip_companies:
  # Health-only insurers — don't write Motor TP
  - niva_bupa
  - aditya_birla_health
  - care_health
  - galaxy_health
  - manipal_cigna
  - narayana_health
  # Different regulatory schema (GCV/PCV/Tractor compliance) — not yet supported
  - chola_ms
  # Agriculture insurer — no Motor TP; AIC consolidated falsely hits NL-27 page
  - aic

# Per-company overrides — min_matches only; hard start/end as last resort
nl44_page_overrides:
  iffco_tokio:
    min_matches: 2   # IFFCO form omits "LIABILITY ONLY POLICIES" as a phrase
